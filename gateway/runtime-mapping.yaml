# Arcana Plugin - Runtime Mapping
# 티어→모델, 추상도구→구체도구, 금지액션→제외도구 매핑

tier_mapping:
  default:
    HEAVY:
      model: "claude-opus-4-6"
    HIGH:
      model: "claude-opus-4-6"
    MEDIUM:
      model: "claude-sonnet-4-6"
    LOW:
      model: "claude-haiku-4-5"

tool_mapping:
  doc_search:
    - type: mcp
      server: "context7"
      tools: ["query-docs", "resolve-library-id"]

  image_generate:
    - type: custom
      source: "tools/generate-image-bridge.py"
      tools: ["generate_image"]

  balancing_simulate:
    - type: custom
      source: "tools/balancing-simulator.py"
      tools: ["simulate_libra", "simulate_augmentation", "simulate_difficulty", "simulate_synergy"]

  game_data_schema:
    - type: custom
      source: "tools/game-data-schema.py"
      tools: ["generate_schema", "validate_data"]

  sound_catalog:
    - type: custom
      source: "tools/sound-asset-catalog.py"
      tools: ["manage_catalog"]

  art_pipeline:
    - type: custom
      source: "tools/art-pipeline-guide.py"
      tools: ["check_spec", "generate_guide"]

  diagram_validate:
    - type: custom
      source: "tools/check-mermaid-bridge.py"
      tools: ["validate_mermaid"]

action_mapping:
  file_write: ["Write", "Edit"]
  file_delete: ["Bash"]
  code_execute: ["Bash"]
  network_access: ["WebFetch", "WebSearch"]
  user_interact: ["AskUserQuestion"]
  agent_delegate: ["Task"]
