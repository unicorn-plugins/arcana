    usage:
      - "캐릭터별 실루엣 + 색상 팔레트 조합 이미지 생성"
      - "정방향/역방향 포즈 비교 컨셉 이미지 생성"
      - "중세 의상 + 타로 도상 결합 캐릭터 컨셉 이미지 생성"

# 근거: ca 에이전트는 캐릭터 원화 기획 역할이므로
# generate_image로 캐릭터 컨셉 참고 이미지를 생성하여 디자인 방향성을 구체화한다.
