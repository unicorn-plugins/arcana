      - "카드 프레임 샘플 생성 (메이저=금색 아르누보, 마이너=은색 아르누보)"
      - "캐릭터별 배경 색상 팔레트 샘플 생성"
      - "비주얼 아이덴티티 가이드용 무드보드 이미지 생성"

# 근거: art-director 에이전트는 비주얼 가이드 수립 역할이므로
